<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{fragments/layout}">
<head><title>Suspect Detail</title></head>
<body>
<th:block layout:fragment="page-title">
  Suspect: <span th:text="${suspect.suspectCode}"></span>
</th:block>
<div layout:fragment="content">
  <div class="row g-3">
    <div class="col-md-8">
      <div class="card border-0 shadow-sm mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span class="fw-semibold" th:text="${suspect.fullName}"></span>
          <div class="d-flex gap-2">
            <span class="badge" th:classappend="'badge-'+${suspect.dangerLevel}" th:text="${suspect.dangerLevel}"></span>
            <span class="badge" th:classappend="'badge-'+${suspect.status}"      th:text="${suspect.status}"></span>
          </div>
        </div>
        <div class="card-body">
          <dl class="row small mb-0">
            <dt class="col-sm-4 text-muted">Code</dt>
            <dd class="col-sm-8"><code th:text="${suspect.suspectCode}"></code></dd>
            <dt class="col-sm-4 text-muted">Alias</dt>
            <dd class="col-sm-8" th:text="${suspect.alias ?: '—'}"></dd>
            <dt class="col-sm-4 text-muted">DOB / Gender</dt>
            <dd class="col-sm-8">
              <span th:text="${suspect.dateOfBirth ?: '—'}"></span> /
              <span th:text="${suspect.gender ?: '—'}"></span>
            </dd>
            <dt class="col-sm-4 text-muted">Nationality</dt>
            <dd class="col-sm-8" th:text="${suspect.nationality}"></dd>
            <dt class="col-sm-4 text-muted">Last Address</dt>
            <dd class="col-sm-8" th:text="${suspect.lastKnownAddress ?: '—'}"></dd>
            <dt class="col-sm-4 text-muted">Physical Description</dt>
            <dd class="col-sm-8" th:text="${suspect.physicalDescription ?: '—'}"></dd>
            <dt class="col-sm-4 text-muted">Modus Operandi</dt>
            <dd class="col-sm-8" th:text="${suspect.modusOperandi ?: '—'}"></dd>
            <dt class="col-sm-4 text-muted">Total Cases</dt>
            <dd class="col-sm-8 fw-semibold" th:text="${suspect.totalCases}"></dd>
            <dt class="col-sm-4 text-muted">Linked Complaints</dt>
            <dd class="col-sm-8" th:text="${suspect.linkedComplaintsCount}"></dd>
            <dt class="col-sm-4 text-muted">Arrest Status</dt>
            <dd class="col-sm-8">
              <span th:if="${suspect.arrested}" class="text-success fw-semibold">
                <i class="bi bi-check-circle me-1"></i>Arrested on
                <span th:text="${suspect.arrestDate}"></span>
              </span>
              <span th:unless="${suspect.arrested}" class="text-danger fw-semibold">
                <i class="bi bi-x-circle me-1"></i>Not Arrested
              </span>
            </dd>
          </dl>
        </div>
      </div>
 
      <!-- Digital Footprint -->
      <div class="card border-0 shadow-sm">
        <div class="card-header fw-semibold"><i class="bi bi-wifi me-2"></i>Digital Footprint</div>
        <div class="card-body">
          <dl class="row small mb-0">
            <dt class="col-sm-4 text-muted">Phone Numbers</dt>
            <dd class="col-sm-8"><code th:text="${suspect.phoneNumbers ?: '—'}"></code></dd>
            <dt class="col-sm-4 text-muted">Email Addresses</dt>
            <dd class="col-sm-8"><code th:text="${suspect.emailAddresses ?: '—'}"></code></dd>
            <dt class="col-sm-4 text-muted">Bank Accounts</dt>
            <dd class="col-sm-8"><code th:text="${suspect.bankAccounts ?: '—'}"></code></dd>
            <dt class="col-sm-4 text-muted">UPI IDs</dt>
            <dd class="col-sm-8"><code th:text="${suspect.upiIds ?: '—'}"></code></dd>
            <dt class="col-sm-4 text-muted">IP Addresses</dt>
            <dd class="col-sm-8"><code th:text="${suspect.ipAddresses ?: '—'}"></code></dd>
            <dt class="col-sm-4 text-muted">Websites</dt>
            <dd class="col-sm-8"><code th:text="${suspect.websites ?: '—'}"></code></dd>
          </dl>
        </div>
      </div>
    </div>
 
    <!-- Right Panel -->
    <div class="col-md-4">
      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body text-center py-4">
          <i class="bi bi-person-circle text-secondary" style="font-size:4rem"></i>
          <div class="fw-bold mt-2" th:text="${suspect.fullName}"></div>
          <div class="text-muted small" th:text="${suspect.suspectCode}"></div>
        </div>
      </div>
 
      <!-- Arrest Action -->
      <div class="card border-0 shadow-sm mb-3"
           sec:authorize="hasAnyRole('OFFICER','ADMIN')"
           th:if="${!suspect.arrested}">
        <div class="card-header fw-semibold text-danger">
          <i class="bi bi-shield-lock me-2"></i>Record Arrest
        </div>
        <div class="card-body">
          <form th:action="@{/suspects/{id}/arrest(id=${suspect.id})}" method="post">
            <div class="mb-2">
              <textarea name="details" class="form-control form-control-sm" rows="2"
                        placeholder="Arrest location and details" required></textarea>
            </div>
            <button type="submit" class="btn btn-danger btn-sm w-100">
              <i class="bi bi-lock me-1"></i>Mark as Arrested
            </button>
          </form>
        </div>
      </div>
 
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <a th:href="@{/suspects/{id}/edit(id=${suspect.id})}"
             class="btn btn-outline-secondary btn-sm w-100 mb-2"
             sec:authorize="hasAnyRole('OFFICER','ADMIN')">
            <i class="bi bi-pencil me-1"></i>Edit Suspect
          </a>
          <a th:href="@{/suspects}" class="btn btn-outline-primary btn-sm w-100">
            <i class="bi bi-arrow-left me-1"></i>Back to List
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
