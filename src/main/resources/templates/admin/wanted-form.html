<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title>Add Wanted Person</title></head>
<body>
<th:block layout:fragment="page-title">Add Wanted Person</th:block>
<div layout:fragment="content">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm">
        <div class="card-header fw-semibold">
          <i class="bi bi-exclamation-triangle me-2 text-danger"></i>New Wanted Person
        </div>
        <div class="card-body">
          <form th:action="@{/admin/wanted/new}" method="post" th:object="${wanted}">

            <div class="row g-3">

              <!-- Full Name -->
              <div class="col-md-6">
                <label class="form-label fw-semibold small">Full Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{name}"
                       placeholder="Suspect's full name" required/>
              </div>

              <!-- Alias -->
              <div class="col-md-6">
                <label class="form-label fw-semibold small">Alias / Nickname</label>
                <input type="text" class="form-control" th:field="*{alias}"
                       placeholder="Known alias or nickname"/>
              </div>

              <!-- Description -->
              <div class="col-12">
                <label class="form-label fw-semibold small">Description</label>
                <textarea class="form-control" th:field="*{description}"
                          rows="3" placeholder="Physical description, background info..."></textarea>
              </div>

              <!-- Last Known Location -->
              <div class="col-md-8">
                <label class="form-label fw-semibold small">Last Known Location</label>
                <input type="text" class="form-control" th:field="*{lastKnownLocation}"
                       placeholder="City, area or address"/>
              </div>

              <!-- Reward -->
              <div class="col-md-4">
                <label class="form-label fw-semibold small">Reward Amount (₹)</label>
                <input type="number" step="0.01" class="form-control" th:field="*{reward}"
                       placeholder="0.00"/>
              </div>

              <!-- Danger Level -->
              <div class="col-md-6">
                <label class="form-label fw-semibold small">Danger Level</label>
                <select class="form-select" th:field="*{dangerLevel}">
                  <option th:each="d : ${dangerLevels}" th:value="${d}" th:text="${d}"></option>
                </select>
              </div>

              <!-- Status -->
              <div class="col-md-6">
                <label class="form-label fw-semibold small">Status</label>
                <select class="form-select" th:field="*{status}">
                  <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                </select>
              </div>

              <!-- Link to Complaint -->
              <div class="col-12">
                <label class="form-label fw-semibold small">Link to Complaint <span class="text-danger">*</span></label>
                <select class="form-select" name="complaint.id" required>
                  <option value="">-- Select Complaint --</option>
                  <option th:each="c : ${complaints}"
                          th:value="${c.id}"
                          th:text="${c.trackingNumber + ' — ' + c.title}"></option>
                </select>
              </div>

            </div>

            <div class="d-flex gap-2 mt-4">
              <button type="submit" class="btn btn-danger">
                <i class="bi bi-check-circle me-1"></i>Save
              </button>
              <a th:href="@{/admin/wanted}" class="btn btn-outline-secondary">
                <i class="bi bi-x-circle me-1"></i>Cancel
              </a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
