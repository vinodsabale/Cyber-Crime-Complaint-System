<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title>Manage Users</title></head>
<body>
<th:block layout:fragment="page-title">Manage Users</th:block>
<div layout:fragment="content">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">All Users</h5>
    <span class="text-muted small">Total: <span th:text="${users.totalElements}">0</span></span>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Full Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Role</th>
              <th>Status</th>
              <th>Registered</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${users.isEmpty()}">
              <td colspan="8" class="text-center text-muted py-4">No users found.</td>
            </tr>
            <tr th:each="u : ${users}">
              <td th:text="${u.id}"></td>
              <td class="fw-semibold" th:text="${u.fullName}"></td>
              <td th:text="${u.email}"></td>
              <td th:text="${u.phone}"></td>
              <td>
                <span class="badge"
                      th:classappend="${u.role.name() == 'ADMIN' ? 'bg-danger' : u.role.name() == 'OFFICER' ? 'bg-primary' : u.role.name() == 'ANALYST' ? 'bg-info text-dark' : 'bg-secondary'}"
                      th:text="${u.role}"></span>
              </td>
              <td>
                <span class="badge"
                      th:classappend="${u.status.name() == 'ACTIVE' ? 'bg-success' : u.status.name() == 'SUSPENDED' ? 'bg-danger' : u.status.name() == 'LOCKED' ? 'bg-warning text-dark' : 'bg-secondary'}"
                      th:text="${u.status}"></span>
              </td>
              <td th:text="${#temporals.format(u.createdAt,'dd MMM yyyy')}"></td>
              <td>
                <form th:action="@{/admin/users/{id}/delete(id=${u.id})}"
                      method="post" class="d-inline"
                      onsubmit="return confirm('Are you sure you want to delete this user?')">
                  <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-2">
                    <i class="bi bi-trash"></i>
                  </button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <!-- Pagination -->
    <div class="card-footer d-flex justify-content-between align-items-center small text-muted"
         th:if="${users.totalPages > 1}">
      <span>Page <span th:text="${users.number + 1}"></span> of <span th:text="${users.totalPages}"></span></span>
      <div class="d-flex gap-1">
        <a th:if="${!users.first}"
           th:href="@{/admin/users(page=${users.number - 1})}"
           class="btn btn-sm btn-outline-secondary py-0">Prev</a>
        <a th:if="${!users.last}"
           th:href="@{/admin/users(page=${users.number + 1})}"
           class="btn btn-sm btn-outline-secondary py-0">Next</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
