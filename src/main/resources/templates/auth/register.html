<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register – Smart Crime Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <style>
    body { background: linear-gradient(135deg,#1a3c5e,#2e75b6); min-height: 100vh; padding: 40px 0; }
    .reg-card { max-width: 580px; margin: 0 auto; }
  </style>
</head>
<body>
<div class="reg-card">
  <div class="card border-0 shadow-lg" style="border-radius:16px">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-shield-fill-check text-primary" style="font-size:2.5rem"></i>
        <h4 class="fw-bold mt-2">Create Account</h4>
        <p class="text-muted small">Register to file crime complaints</p>
      </div>
 
      <div th:if="${error}" class="alert alert-danger py-2 small">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
      </div>
 
      <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label fw-semibold small">Full Name <span class="text-danger">*</span></label>
            <input type="text" th:field="*{fullName}" class="form-control"
                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                   placeholder="Your full legal name"/>
            <div class="invalid-feedback" th:errors="*{fullName}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Email <span class="text-danger">*</span></label>
            <input type="email" th:field="*{email}" class="form-control"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                   placeholder="you@example.com"/>
            <div class="invalid-feedback" th:errors="*{email}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Phone <span class="text-danger">*</span></label>
            <input type="tel" th:field="*{phone}" class="form-control"
                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                   placeholder="10-digit mobile number"/>
            <div class="invalid-feedback" th:errors="*{phone}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Password <span class="text-danger">*</span></label>
            <input type="password" th:field="*{password}" class="form-control"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                   placeholder="Min 8 chars, upper, lower, digit, special"/>
            <div class="invalid-feedback" th:errors="*{password}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Confirm Password <span class="text-danger">*</span></label>
            <input type="password" th:field="*{confirmPassword}" class="form-control"
                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                   placeholder="Re-enter password"/>
            <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
          </div>
          <div class="col-12">
            <label class="form-label small">Address</label>
            <input type="text" th:field="*{address}" class="form-control" placeholder="Street address"/>
          </div>
          <div class="col-md-4">
            <label class="form-label small">City</label>
            <input type="text" th:field="*{city}" class="form-control"/>
          </div>
          <div class="col-md-4">
            <label class="form-label small">State</label>
            <input type="text" th:field="*{state}" class="form-control"/>
          </div>
          <div class="col-md-4">
            <label class="form-label small">PIN Code</label>
            <input type="text" th:field="*{pincode}" class="form-control" placeholder="6-digit"/>
          </div>
          <div class="col-12">
            <label class="form-label small">Aadhar Number (optional)</label>
            <input type="text" th:field="*{aadharNumber}" class="form-control" placeholder="XXXX XXXX XXXX"/>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
              <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
          </div>
          <div class="col-12 text-center small">
            Already have an account?
            <a th:href="@{/login}" class="text-primary fw-semibold text-decoration-none">Sign In</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
