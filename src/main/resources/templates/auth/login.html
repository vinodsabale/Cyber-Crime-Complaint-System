<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login – Smart Crime Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <style>
    body { background: linear-gradient(135deg,#1a3c5e,#2e75b6); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 420px; border-radius: 16px; }
  </style>
</head>
<body>
<div class="login-card shadow-lg">
  <div class="card border-0" style="border-radius:16px">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-shield-fill-check text-primary" style="font-size:3rem"></i>
        <h4 class="fw-bold mt-2">Smart Crime Tracker</h4>
        <p class="text-muted small">Sign in to your account</p>
      </div>
 
      <div th:if="${error}"   class="alert alert-danger  py-2 small"><i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span></div>
      <div th:if="${message}" class="alert alert-success py-2 small"><i class="bi bi-check-circle me-2"></i><span th:text="${message}"></span></div>
      <div th:if="${param.logout}" class="alert alert-info py-2 small"><i class="bi bi-box-arrow-left me-2"></i>Logged out successfully.</div>
 
      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" id="pwd" class="form-control" placeholder="Enter password" required/>
            <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()">
              <i class="bi bi-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>
        <div class="mb-3">
          <div class="form-check">
            <input type="checkbox" name="remember-me" class="form-check-input" id="rem"/>
            <label for="rem" class="form-check-label small">Remember me</label>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>
 
      <hr class="my-4"/>
      <div class="text-center small">
        Don't have an account?
        <a th:href="@{/register}" class="text-primary fw-semibold text-decoration-none">Register here</a>
      </div>
      <div class="text-center mt-3">
        <a th:href="@{/complaints/track}" class="text-muted small text-decoration-none">
          <i class="bi bi-search me-1"></i>Track complaint without login
        </a>
      </div>
    </div>
  </div>
</div>
<script>
  function togglePwd() {
    const p = document.getElementById('pwd');
    const i = document.getElementById('eye-icon');
    p.type = p.type === 'password' ? 'text' : 'password';
    i.className = p.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
  }
</script>
</body>
</html>
