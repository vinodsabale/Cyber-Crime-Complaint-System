<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{fragments/layout}">
<head><title>Officer – Complaints</title></head>
<body>
<th:block layout:fragment="page-title">Complaints (Officer View)</th:block>
<div layout:fragment="content">

  <!-- Filter bar -->
  <form th:action="@{/officer/complaints}" method="get" class="row g-2 mb-3">
    <div class="col-md-3">
      <select name="status" class="form-select form-select-sm">
        <option value="">All Statuses</option>
        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                th:selected="${s == currentStatus}"></option>
      </select>
    </div>
    <div class="col-auto">
      <button type="submit" class="btn btn-primary btn-sm">
        <i class="bi bi-funnel me-1"></i>Filter
      </button>
      <a th:href="@{/officer/complaints}" class="btn btn-outline-secondary btn-sm ms-1">Reset</a>
    </div>
  </form>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Tracking No.</th>
              <th>Title</th>
              <th>Category</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Assigned Officer</th>
              <th>Filed On</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${complaints.isEmpty()}">
              <td colspan="8" class="text-center text-muted py-4">No complaints found.</td>
            </tr>
            <tr th:each="c : ${complaints}">
              <td><code th:text="${c.trackingNumber}"></code></td>
              <td th:text="${c.title}"></td>
              <td th:text="${c.category}"></td>
              <td>
                <span class="badge" th:classappend="'badge-'+${c.priority}" th:text="${c.priority}"></span>
              </td>
              <td>
                <span class="badge" th:classappend="'badge-'+${c.status}" th:text="${c.status}"></span>
              </td>
              <td>
                <span th:text="${c.assignedOfficerName ?: '—'}"></span>
              </td>
              <td th:text="${#temporals.format(c.createdAt,'dd MMM yyyy')}"></td>
              <td>
                <a th:href="@{/complaints/{id}(id=${c.id})}"
                   class="btn btn-sm btn-outline-primary py-0 px-2">
                  <i class="bi bi-eye"></i> View
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <!-- Pagination -->
    <div class="card-footer d-flex justify-content-between align-items-center small text-muted"
         th:if="${complaints.totalPages > 1}">
      <span>Page <span th:text="${complaints.number + 1}"></span> of <span th:text="${complaints.totalPages}"></span></span>
      <div class="d-flex gap-1">
        <a th:if="${!complaints.first}"
           th:href="@{/officer/complaints(page=${complaints.number - 1}, status=${currentStatus})}"
           class="btn btn-sm btn-outline-secondary py-0">Prev</a>
        <a th:if="${!complaints.last}"
           th:href="@{/officer/complaints(page=${complaints.number + 1}, status=${currentStatus})}"
           class="btn btn-sm btn-outline-secondary py-0">Next</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
