
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Track Complaint</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <style>
    body { background: #f4f6f9; }
    .track-card { max-width: 680px; margin: 60px auto; }
  </style>
</head>
<body>
<div class="track-card">
  <div class="text-center mb-4">
    <i class="bi bi-shield-fill-check text-primary fs-1"></i>
    <h4 class="mt-2 fw-bold">Track Your Complaint</h4>
    <p class="text-muted small">Enter tracking number to check status</p>
  </div>
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-4">
      <form th:action="@{/complaints/track}" method="post">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-search"></i></span>
          <input type="text" name="trackingNumber" class="form-control form-control-lg"
                 placeholder="e.g. CRM-2024-00000001" required/>
          <button type="submit" class="btn btn-primary px-4">Track</button>
        </div>
      </form>
    </div>
  </div>
 
  <div th:if="${error}" class="alert alert-danger">
    <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
  </div>
 
  <div th:if="${complaint}" class="card border-0 shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-semibold" th:text="${complaint.trackingNumber}"></span>
      <span class="badge fs-6" th:classappend="'badge-'+${complaint.status}" th:text="${complaint.status}"></span>
    </div>
    <div class="card-body">
      <h6 class="fw-bold" th:text="${complaint.title}"></h6>
      <div class="row g-2 small text-muted mb-3">
        <div class="col-6"><i class="bi bi-tag me-1"></i><span th:text="${complaint.category}"></span></div>
        <div class="col-6"><i class="bi bi-calendar me-1"></i>
          <span th:text="${#temporals.format(complaint.createdAt,'dd MMM yyyy')}"></span></div>
        <div class="col-6"><i class="bi bi-geo-alt me-1"></i><span th:text="${complaint.incidentLocation}"></span></div>
        <div class="col-6"><i class="bi bi-person-badge me-1"></i>
          <span th:text="${complaint.assignedOfficerName != null ? complaint.assignedOfficerName : 'Not Assigned'}"></span>
        </div>
      </div>
      <h6 class="fw-semibold mb-2">Status Timeline</h6>
      <div th:each="h : ${complaint.statusHistory}" class="d-flex gap-2 mb-2">
        <i class="bi bi-check-circle-fill text-success mt-1"></i>
        <div>
          <div class="small fw-semibold" th:text="${h.toStatus}"></div>
          <div class="text-muted" style="font-size:.78rem">
            <span th:text="${h.changedBy}"></span> ·
            <span th:text="${#temporals.format(h.changedAt,'dd MMM yyyy HH:mm')}"></span>
          </div>
          <div class="text-muted" style="font-size:.78rem" th:text="${h.remarks}"></div>
        </div>
      </div>
      <div th:if="${complaint.resolutionNotes}" class="alert alert-success mt-3 small">
        <i class="bi bi-check-circle me-2"></i><strong>Resolution:</strong>
        <span th:text="${complaint.resolutionNotes}"></span>
      </div>
    </div>
  </div>
 
  <div class="text-center mt-4 small text-muted">
    <a th:href="@{/login}" class="text-decoration-none">
      <i class="bi bi-box-arrow-in-right me-1"></i>Login to file a complaint
    </a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
