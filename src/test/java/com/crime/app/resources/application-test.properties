# Test Profile - uses H2 in-memory DB
 
spring.datasource.url=jdbc:mysql://localhost:3306/smart_crime_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=test-secret-key-2024-very-long-secure-key-for-hs256-algorithm-testing
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Upload
app.upload.dir=./test-uploads
app.upload.allowed-types=pdf,jpg,jpeg,png,txt

# Mail (disabled in tests)
spring.mail.host=localhost
spring.mail.port=25

# Logging
logging.level.com.crime=WARN
logging.level.org.springframework.security=WARN